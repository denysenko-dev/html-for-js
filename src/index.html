<!doctype html>
<html lang="en">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<meta name="description" content="Online CV showcasing professional skills, work experience and education.">
		<meta name="keywords" content="CV, resume, portfolio, marketing director">
		<link rel="stylesheet" href="./css/bootstrap.css">
		<link rel="stylesheet" href="./css/fonts.css">
		<link rel="stylesheet" href="./css/style.css">
		<link rel="icon" type="image/svg+xml" href="images/favicon.svg">

		<title>CV | Resume</title>
	</head>

	<body class="body-bg">
		<main class="container mb-5">
			<div class="row cv mt-0 mt-sm-4">
				<div class="col-12 col-lg-3 col-md-4 cv-left">
					<div class="row">
						<div class="photo-block col-12 col-md-12 col-sm-6 text-center">
							<img src="" alt="my photo" class="img-thumbnail rounded-circle my-4 my-sm-3" id="my-photo">
							<ul class="contacts-block"></ul>
							<address class="address"></address>
						</div>
						<div class="col-12 col-lg-12 col-md-12 col-sm-6">
							<hr class="bg-white d-sm-none d-md-block">
							<section class="mt-3">
								<h2>Skills</h2>
								<ul class="skills-list"></ul>
							</section>
						</div>
						<div class="col-12">
							<hr class="bg-white d-none d-sm-block d-md-none d-lg-none">
							<section>
								<h2>Education</h2>
								<ul class="education-list"></ul>
							</section>
						</div>
						<div class="col-12">
							<section>
								<h2>Achievements</h2>
								<ul class="achievements-list"></ul>
							</section>
						</div>
					</div>
				</div>
				<div class="col-12 col-lg-9 col-md-8 cv-right">
					<article>
						<header>
							<h1 class="text-center cv-header mt-4 mb-4" id="my-name"></h1>
							<h2 class="job-title text-center lines color-gray mb-4" id="job-title"></h2>
						</header>
						<h3 class="mb-3 profile color-gray">Profile</h3>
						<p class="mb-5 profile-data"></p>
						<h3 class="mb-3 experience color-gray">Experience</h3>
						<div class="experience-list"></div>
					</article>
				</div>
			</div>
		</main>

		<script src="./js/bootstrap.bundle.min.js"></script>
		<script src="js/data.js"></script>
		<script src="js/experience.js"></script>
		<script src="js/app.js"></script>

	</body>

</html>
